name: Submit to package managers

on:
  push:
    branches: [main]
    paths:
      - "winget/**"
      - "chocolatey/**"
  workflow_dispatch:

jobs:
  winget:
    name: Submit to winget-pkgs
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        shell: pwsh
        run: |
          $version = ((Select-String -Path winget/GodwitIO.GodwitSync.yaml -Pattern '^PackageVersion:\s*(.+)$').Matches[0].Groups[1].Value).Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Submit manifests to winget-pkgs
        shell: pwsh
        env:
          WINGET_GH_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe submit `
            --token $env:WINGET_GH_TOKEN `
            --prtitle "GodwitIO.GodwitSync version ${{ steps.version.outputs.version }}" `
            winget

  chocolatey:
    name: Submit to Chocolatey
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Pack and push to Chocolatey
        run: |
          choco pack chocolatey/godwit-sync.nuspec
          $nupkg = (Get-Item godwit-sync.*.nupkg).FullName
          choco push $nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
